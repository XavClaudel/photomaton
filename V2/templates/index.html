<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>IHM Caméra & Impression</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }
        button {
            margin: 10px;
            padding: 15px 25px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background-color: #4CAF50;
            color: white;
        }
        button:hover {
            background-color: #45a049;
        }
        #result {
            margin-top: 20px;
            font-size: 18px;
            color: #333;
        }
    </style>
</head>
<body>

    <h1>IHM - Caméra & Impression</h1>

    <button onclick="takePhoto()">📸 Prendre une photo</button>
    <button onclick="printPhoto()">🖨️ Imprimer</button>

    <div id="result"></div>

    <script>
        async function takePhoto() {
            try {
                let response = await fetch("/take-photo");
                let data = await response.json();
                document.getElementById("result").innerHTML = 
                    "✅ Photo prise : " + data.photo;
            } catch (error) {
                document.getElementById("result").innerHTML = "❌ Erreur : " + error;
            }
        }

        async function printPhoto() {
            try {
                let response = await fetch("/print");
                let data = await response.json();
                if (data.status === "success") {
                    document.getElementById("result").innerHTML = "🖨️ " + data.message;
                } else {
                    document.getElementById("result").innerHTML = "⚠️ " + data.message;
                }
            } catch (error) {
                document.getElementById("result").innerHTML = "❌ Erreur : " + error;
            }
        }
    </script>

</body>
</html>
